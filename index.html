<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifikasi Akses</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%; left: -30%;
      width: 80%; height: 80%;
      background: radial-gradient(circle, rgba(24,95,165,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -30%; right: -20%;
      width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(15,110,86,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      backdrop-filter: blur(12px);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: #185FA5;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 30px; height: 30px; fill: white; }

    .title { text-align: center; margin-bottom: 2rem; }
    .title h1 {
      font-size: 1.4rem; font-weight: 600;
      color: #fff; letter-spacing: -0.02em; margin-bottom: 0.4rem;
    }
    .title p { font-size: 0.85rem; color: rgba(255,255,255,0.45); line-height: 1.5; }

    .site-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(24,95,165,0.2);
      border: 1px solid rgba(24,95,165,0.4);
      border-radius: 99px; padding: 4px 12px;
      font-size: 0.78rem; color: #85B7EB; margin-bottom: 2rem;
    }
    .site-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%; background: #4CAF50; flex-shrink: 0;
    }
    .site-badge-wrap { display: flex; justify-content: center; }

    label {
      display: block; font-size: 0.8rem; font-weight: 500;
      color: rgba(255,255,255,0.55); margin-bottom: 0.4rem;
      letter-spacing: 0.03em; text-transform: uppercase;
    }

    .input-wrap { position: relative; margin-bottom: 1.25rem; }

    .prefix {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem; color: rgba(255,255,255,0.5);
      pointer-events: none; user-select: none;
    }

    input[type="tel"], input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 3.2rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: #fff; font-size: 1rem;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }

    input[type="text"].otp-input {
      padding-left: 1rem; letter-spacing: 0.35em;
      font-size: 1.3rem; text-align: center;
    }

    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus { border-color: rgba(24,95,165,0.7); background: rgba(255,255,255,0.08); }

    .btn {
      width: 100%; padding: 0.8rem; border: none;
      border-radius: 12px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #185FA5; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1a6bb5; }
    .btn-secondary {
      background: transparent; color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      margin-top: 0.6rem; font-size: 0.85rem;
    }
    .btn-secondary:hover:not(:disabled) {
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.05);
    }

    .msg {
      padding: 0.65rem 0.9rem; border-radius: 8px;
      font-size: 0.83rem; margin-bottom: 1rem; display: none;
    }
    .msg.error { background: rgba(163,45,45,0.2); border: 1px solid rgba(163,45,45,0.4); color: #f4a0a0; display: block; }
    .msg.success { background: rgba(59,109,17,0.2); border: 1px solid rgba(59,109,17,0.4); color: #9fd45a; display: block; }
    .msg.info { background: rgba(24,95,165,0.2); border: 1px solid rgba(24,95,165,0.4); color: #85B7EB; display: block; }

    .step { display: none; }
    .step.active { display: block; }

    .tg-hint {
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(0,136,204,0.12);
      border: 1px solid rgba(0,136,204,0.25);
      border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1.25rem;
    }
    .tg-hint svg { width: 20px; height: 20px; fill: #29b6f6; flex-shrink: 0; margin-top: 1px; }
    .tg-hint p { font-size: 0.82rem; color: rgba(255,255,255,0.55); line-height: 1.5; }
    .tg-hint strong { color: #29b6f6; font-weight: 500; }

    .timer { text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.35); margin-top: 0.75rem; }
    .timer span { color: #85B7EB; font-weight: 500; }

    .footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: rgba(255,255,255,0.2); }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5zm-1 4v4h2V9h-2zm0 6v2h2v-2h-2z"/></svg>
      </div>
    </div>

    <div class="title">
      <h1>Verifikasi Akses</h1>
      <p>Masukkan nomor HP untuk mendapatkan kode OTP via Telegram</p>
    </div>

    <div class="site-badge-wrap">
      <div class="site-badge">
        <span class="dot"></span>
        <span id="site-name">Memuat...</span>
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Step 1 -->
    <div class="step active" id="step1">
      <label for="phone">Nomor HP</label>
      <div class="input-wrap">
        <span class="prefix">+62</span>
        <input type="tel" id="phone" placeholder="8xxxxxxxxxx" maxlength="13" autocomplete="tel" inputmode="numeric" />
      </div>
      <button class="btn btn-primary" id="btn-send" onclick="sendOTP()">
        Kirim OTP via Telegram
      </button>
    </div>

    <!-- Step 2 -->
    <div class="step" id="step2">
      <div class="tg-hint">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.119 14.03l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.53z"/></svg>
        <p>Kode OTP dikirim ke Telegram yang terhubung dengan nomor <strong id="phone-display"></strong></p>
      </div>

      <label for="otp">Kode OTP</label>
      <div class="input-wrap">
        <input type="text" id="otp" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
      </div>

      <button class="btn btn-primary" id="btn-verify" onclick="verifyOTP()">
        Verifikasi & Masuk
      </button>
      <button class="btn btn-secondary" id="btn-resend" onclick="resendOTP()" disabled>
        <span id="resend-label">Kirim ulang (60s)</span>
      </button>

      <div class="timer">
        Kode berlaku selama <span id="timer">5:00</span>
      </div>
    </div>
  </div>

  <div class="footer">Portal OTP &mdash; Powered by Telegram</div>

  <script>
    // ============================================================
    // ⚙️  GANTI INI dengan URL Railway kamu setelah deploy
    // Contoh: "https://otp-portal-production.up.railway.app"
    // ============================================================
    const API_BASE = "https://GANTI-DENGAN-URL-RAILWAY-KAMU.up.railway.app";

    const params = new URLSearchParams(window.location.search);
    const siteParam = params.get('site') || window.location.hostname;
    document.getElementById('site-name').textContent = siteParam;

    let countdown, resendCountdown, currentPhone = '';

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.className = 'msg ' + type;
      el.textContent = text;
    }
    function hideMsg() { document.getElementById('msg').className = 'msg'; }

    function setStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      hideMsg();
    }

    async function sendOTP() {
      const raw = document.getElementById('phone').value.trim().replace(/\D/g, '');
      if (!raw || raw.length < 8) { showMsg('Masukkan nomor HP yang valid.', 'error'); return; }
      const phone = '62' + raw.replace(/^0/, '');
      currentPhone = phone;

      const btn = document.getElementById('btn-send');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Mengirim...';

      try {
        const res = await fetch(`${API_BASE}/api/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, site: siteParam })
        });
        const data = await res.json();
        if (data.ok) {
          document.getElementById('phone-display').textContent = '+' + phone;
          setStep(2);
          showMsg('OTP berhasil dikirim ke Telegram kamu!', 'success');
          startOTPTimer();
          startResendCountdown();
        } else {
          showMsg(data.message || 'Gagal mengirim OTP.', 'error');
        }
      } catch (e) {
        showMsg('Tidak bisa terhubung ke server. Coba lagi.', 'error');
      }

      btn.disabled = false;
      btn.innerHTML = 'Kirim OTP via Telegram';
    }

    async function verifyOTP() {
      const otp = document.getElementById('otp').value.trim();
      if (otp.length !== 6) { showMsg('Masukkan 6 digit kode OTP.', 'error'); return; }

      const btn = document.getElementById('btn-verify');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Memeriksa...';

      try {
        const res = await fetch(`${API_BASE}/api/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: currentPhone, otp, site: siteParam })
        });
        const data = await res.json();
        if (data.ok) {
          clearInterval(countdown);
          showMsg('Verifikasi berhasil! Mengalihkan...', 'success');
          btn.innerHTML = '✓ Berhasil';
          setTimeout(() => { window.location.href = data.redirect; }, 1200);
        } else {
          showMsg(data.message || 'Kode salah atau kadaluarsa.', 'error');
          btn.disabled = false;
          btn.innerHTML = 'Verifikasi & Masuk';
        }
      } catch (e) {
        showMsg('Koneksi gagal. Coba lagi.', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Verifikasi & Masuk';
      }
    }

    function resendOTP() {
      document.getElementById('otp').value = '';
      clearInterval(countdown);
      clearInterval(resendCountdown);
      setStep(1);
    }

    function startOTPTimer(s = 300) {
      clearInterval(countdown);
      const el = document.getElementById('timer');
      countdown = setInterval(() => {
        s--;
        el.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
        if (s <= 0) { clearInterval(countdown); el.textContent = 'Habis'; showMsg('OTP kadaluarsa. Kirim ulang.', 'error'); }
      }, 1000);
    }

    function startResendCountdown(s = 60) {
      clearInterval(resendCountdown);
      const btn = document.getElementById('btn-resend');
      const lbl = document.getElementById('resend-label');
      btn.disabled = true;
      resendCountdown = setInterval(() => {
        s--;
        lbl.textContent = s > 0 ? `Kirim ulang (${s}s)` : 'Kirim ulang OTP';
        if (s <= 0) { clearInterval(resendCountdown); btn.disabled = false; }
      }, 1000);
    }

    document.getElementById('phone').addEventListener('keydown', e => { if (e.key === 'Enter') sendOTP(); });
    document.getElementById('otp').addEventListener('keydown', e => { if (e.key === 'Enter') verifyOTP(); });
    document.getElementById('otp').addEventListener('input', e => { e.target.value = e.target.value.replace(/\D/g,'').slice(0,6); });
  </script>
</body>
</html>
